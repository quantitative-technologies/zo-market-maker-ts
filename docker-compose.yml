x-mm-common: &mm-common
  build: .
  restart: "no"
  env_file:
    - .env
  volumes:
    - ./config.toml:/app/config.toml:ro
    - ./logs:/app/logs
  logging:
    driver: "json-file"
    options:
      max-size: "3m"
      max-file: "3"

services:
  mm-sol:
    <<: *mm-common
    command: ["SOL"]

  mm-btc:
    <<: *mm-common
    command: ["BTC"]

  mm-eth:
    <<: *mm-common
    command: ["ETH"]

  mm-hype:
    <<: *mm-common
    command: ["HYPE"]

  mm-xrp:
    <<: *mm-common
    command: ["XRP"]

  mm-sui:
    <<: *mm-common
    command: ["SUI"]
